# Corveon — local development services.
# Brings up Postgres (with pgvector), Redis, and Ollama. The API and ARQ worker
# are typically run from the host during development (uvicorn / arq); a containerized
# api/worker profile can be added once app entrypoints exist (see backend.Dockerfile).

services:
  postgres:
    image: pgvector/pgvector:pg16
    # Bootstraps as the default "postgres" superuser (POSTGRES_USER/DB left
    # unset). The init script creates "corveon" as a separate, non-superuser,
    # database-owning role — required for Row-Level Security to actually
    # apply to the app's own queries (ADR-0013). Do not set POSTGRES_USER
    # back to "corveon" — Postgres protects the bootstrap role from being
    # demoted, which is exactly the problem this setup avoids.
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # Optional local, zero-cost LLM provider (the implicit default). Pull a model with:
    #   docker compose exec ollama ollama pull llama3.1

volumes:
  pgdata:
  redisdata:
  ollama-data:
