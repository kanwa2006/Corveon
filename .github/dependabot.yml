# Dependabot — automated dependency updates.
# Grouped to reduce PR noise; security updates always open individually.
version: 2
updates:
  # ── Backend (Python) ──────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "backend"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      backend-minor-patch:
        update-types: ["minor", "patch"]

  # ── Frontend (npm / pnpm) ─────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["dependencies", "frontend"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      frontend-minor-patch:
        update-types: ["minor", "patch"]

  # ── GitHub Actions ────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "chore(ci)"

  # ── Docker base images ────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/infra/docker"
    schedule:
      interval: "weekly"
      day: "monday"
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "chore(docker)"
    ignore:
      # Python 3.12 is a pinned architecture decision (CLAUDE.md, docs/ARCHITECTURE.md,
      # backend/pyproject.toml `requires-python`). A base-image bump past 3.12.x would
      # break the build (pip enforces requires-python) without a corresponding ADR that
      # supersedes the pin — so don't propose it as routine dependency churn.
      - dependency-name: "python"
        versions: [">=3.13"]
