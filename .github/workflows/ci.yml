name: CI

# Gate order (docs/DEPLOYMENT.md): lint → typecheck → test → security → build.
# Deploy is intentionally NOT wired here yet; it is added when app entrypoints land.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint · type · test · security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: corveon
          POSTGRES_PASSWORD: corveon
          POSTGRES_DB: corveon_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U corveon"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://corveon:corveon@localhost:5432/corveon_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-only-not-a-real-secret-ci-only-not-a-real-secret
      CORVEON_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Typecheck (mypy --strict)
        run: mypy app
      - name: Test (pytest)
        run: pytest
      - name: Migrations ↔ models sync check
        run: |
          if [ -f alembic.ini ]; then
            alembic upgrade head
            # A fresh autogenerate against head must produce an EMPTY diff (ADR-0002).
            alembic revision --autogenerate -m "ci-sync-check" --rev-id ci_sync_check
            if grep -Eq "op\.(create|drop|add|alter)" migrations/versions/ci_sync_check_*.py; then
              echo "::error::models and migrations are out of sync"; exit 1
            fi
            rm -f migrations/versions/ci_sync_check_*.py
          else
            echo "No alembic.ini yet — skipping (data layer lands in Week 1)."
          fi
      - name: Security — SAST (bandit)
        run: bandit -q -r app
      - name: Security — dependency audit (pip-audit)
        run: pip-audit

  frontend:
    name: Frontend (lint · type · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      # The frontend gates activate once the Next app scaffold lands (Roadmap Week 1);
      # until then this job passes with a notice instead of failing on an empty tree.
      # The first frontend PR commits pnpm-lock.yaml, enabling --frozen-lockfile below.
      - name: Detect Next app
        id: detect
        run: |
          if [ -f frontend/next.config.mjs ] || [ -f frontend/next.config.js ] || [ -f frontend/app/layout.tsx ]; then
            echo "has_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_app=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Next app scaffold not present yet — skipping frontend build gates."
          fi
      - uses: pnpm/action-setup@v4
        if: steps.detect.outputs.has_app == 'true'
        with:
          version: 9
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.has_app == 'true'
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        if: steps.detect.outputs.has_app == 'true'
        run: pnpm install --frozen-lockfile
      - name: Lint
        if: steps.detect.outputs.has_app == 'true'
        run: pnpm lint
      - name: Typecheck
        if: steps.detect.outputs.has_app == 'true'
        run: pnpm typecheck
      - name: Unit tests (Vitest)
        if: steps.detect.outputs.has_app == 'true'
        run: pnpm test
      - name: Build
        if: steps.detect.outputs.has_app == 'true'
        run: pnpm build
