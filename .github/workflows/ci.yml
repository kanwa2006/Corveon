name: CI

# Gate order (docs/DEPLOYMENT.md): lint → typecheck → test → security → build → e2e/a11y.
# Deploy is intentionally NOT wired here yet; it is added when app entrypoints land.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint · type · test · security)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      # Bootstraps as the default "postgres" superuser; the next step creates
      # "corveon" as a separate, non-superuser, database-owning role — Row-
      # Level Security is a no-op against a superuser connection regardless
      # of FORCE, and Postgres refuses to demote the bootstrap role itself
      # (ADR-0013).
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://corveon:corveon@localhost:5432/corveon_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-only-not-a-real-secret-ci-only-not-a-real-secret
      CORVEON_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install tesseract-ocr (OCR ingestion)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - name: Create non-superuser app role (ADR-0013)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -c "CREATE ROLE corveon WITH LOGIN PASSWORD 'corveon';"
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE corveon_test OWNER corveon;"
          # pgvector requires superuser to CREATE EXTENSION; corveon (non-
          # superuser) cannot do this itself (same reasoning as the role
          # creation above) — done once here before migrations ever run.
          psql -h localhost -U postgres -d corveon_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Format check (ruff)
        run: ruff format --check .
      - name: Typecheck (mypy --strict)
        run: mypy app
      - name: Test (pytest)
        run: pytest
      - name: Migrations ↔ models sync check
        run: |
          if [ -f alembic.ini ]; then
            alembic upgrade head
            # A fresh autogenerate against head must produce an EMPTY diff (ADR-0002).
            alembic revision --autogenerate -m "ci-sync-check" --rev-id ci_sync_check
            if grep -Eq "op\.(create|drop|add|alter)" migrations/versions/ci_sync_check_*.py; then
              echo "::error::models and migrations are out of sync"; exit 1
            fi
            rm -f migrations/versions/ci_sync_check_*.py
          else
            echo "No alembic.ini yet — skipping (data layer lands in Week 1)."
          fi
      - name: Security — SAST (bandit)
        run: bandit -q -r app
      - name: Security — dependency audit (pip-audit)
        run: pip-audit

  frontend:
    name: Frontend (lint · type · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      # The frontend gates activate once the Next app scaffold lands (Roadmap Week 1);
      # until then this job passes with a notice instead of failing on an empty tree.
      # The first frontend PR commits pnpm-lock.yaml, enabling --frozen-lockfile below.
      - name: Detect Next app
        id: detect
        # working-directory (frontend) already applies to this step — these
        # paths are relative to it, not repo root (a doubled frontend/frontend/
        # prefix here previously made this check always false, silently
        # skipping every frontend gate below despite the job showing green).
        run: |
          if [ -f next.config.mjs ] || [ -f next.config.js ] || [ -f app/layout.tsx ]; then
            echo "has_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_app=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Next app scaffold not present yet — skipping frontend build gates."
          fi
      - uses: pnpm/action-setup@v4
        if: steps.detect.outputs.has_app == 'true'
        with:
          version: 9
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.has_app == 'true'
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install
        if: steps.detect.outputs.has_app == 'true'
        run: pnpm install --frozen-lockfile
      - name: Lint
        if: steps.detect.outputs.has_app == 'true'
        run: pnpm lint
      - name: Typecheck
        if: steps.detect.outputs.has_app == 'true'
        run: pnpm typecheck
      - name: Unit tests (Vitest)
        if: steps.detect.outputs.has_app == 'true'
        run: pnpm test
      - name: Build
        if: steps.detect.outputs.has_app == 'true'
        run: pnpm build

  contract:
    name: API contract (schemathesis)
    runs-on: ubuntu-latest
    needs: [backend]
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://corveon:corveon@localhost:5432/corveon_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-only-not-a-real-secret-ci-only-not-a-real-secret
      CORVEON_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Create non-superuser app role (ADR-0013)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -c "CREATE ROLE corveon WITH LOGIN PASSWORD 'corveon';"
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE corveon_test OWNER corveon;"
          psql -h localhost -U postgres -d corveon_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Start backend API
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > "$GITHUB_WORKSPACE/backend.log" 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "backend is up"; exit 0
            fi
            sleep 1
          done
          echo "::error::backend did not become healthy in time"
          cat "$GITHUB_WORKSPACE/backend.log"
          exit 1
      - name: Register + log in a contract-test user
        run: |
          curl -sSf -X POST http://localhost:8000/api/v1/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"schemathesis-ci@example.com","password":"correcthorsebattery"}' > /dev/null
          TOKEN=$(curl -sSf -X POST http://localhost:8000/api/v1/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"schemathesis-ci@example.com","password":"correcthorsebattery"}' \
            | python -c "import json,sys; print(json.load(sys.stdin)['access'])")
          echo "::add-mask::$TOKEN"
          echo "CONTRACT_TEST_TOKEN=$TOKEN" >> "$GITHUB_ENV"
      - name: Run schemathesis
        working-directory: backend
        # Property-based fuzzing against the live OpenAPI schema, scoped to
        # `not_a_server_error` only — every other built-in check
        # (status_code_conformance etc.) flags routes that correctly return
        # 401/404/422 for cases our OpenAPI metadata doesn't enumerate, which
        # is a documentation-completeness gap, not a contract violation; the
        # check that actually matters for safety (no route may crash into an
        # unhandled 500 on malformed input) is the one enabled here. Caught a
        # real bug this way — see CHANGELOG (validation_error_handler could
        # itself raise on certain malformed multipart uploads).
        run: |
          schemathesis run http://localhost:8000/openapi.json \
            -H "Authorization: Bearer $CONTRACT_TEST_TOKEN" \
            -c not_a_server_error \
            --max-examples 25 \
            --phases examples,fuzzing \
            --suppress-health-check too_slow,filter_too_much
      - name: Performance smoke (Locust, concurrency only — not a latency gate)
        working-directory: backend
        # A shared CI runner gives noisy, non-reproducible latency numbers, so
        # this doesn't assert response-time thresholds. It does assert zero
        # request failures under concurrent load — a hot path that only
        # breaks under concurrency (a pool-exhaustion or race-condition class
        # of bug) is exactly what the sequential pytest suite can't catch.
        run: |
          locust -f tests/performance/locustfile.py --host http://localhost:8000 \
            --headless -u 5 -r 5 --run-time 15s --exit-code-on-error 1
      - name: Upload debug logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: contract-failure-logs
          path: backend/backend.log
          retention-days: 7

  e2e:
    name: Frontend E2E + A11y (Playwright, full stack)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    # Playwright's testMatch covers both tests/e2e/**/*.spec.ts and
    # tests/a11y/**/*.spec.ts (frontend/playwright.config.ts) — one run of
    # `pnpm test:e2e` exercises both, so this single job is both gates.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://corveon:corveon@localhost:5432/corveon_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-only-not-a-real-secret-ci-only-not-a-real-secret
      CORVEON_ENV: test
      FRONTEND_ORIGIN: http://localhost:3000
      # No AI provider is configured on purpose — the messaging e2e/a11y specs
      # exercise the real degraded-mode path (ADR-0006), not a simulation.
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_SSE_BASE_URL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install tesseract-ocr (OCR ingestion)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr
      - name: Create non-superuser app role (ADR-0013)
        env:
          PGPASSWORD: postgres
        run: |
          psql -h localhost -U postgres -d postgres -c "CREATE ROLE corveon WITH LOGIN PASSWORD 'corveon';"
          psql -h localhost -U postgres -d postgres -c "CREATE DATABASE corveon_test OWNER corveon;"
          psql -h localhost -U postgres -d corveon_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - name: Install backend
        working-directory: backend
        run: pip install -e ".[dev]"
      - name: Apply migrations
        working-directory: backend
        run: alembic upgrade head
      - name: Start backend API
        working-directory: backend
        run: |
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > "$GITHUB_WORKSPACE/backend.log" 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "backend is up"; exit 0
            fi
            sleep 1
          done
          echo "::error::backend did not become healthy in time"
          cat "$GITHUB_WORKSPACE/backend.log"
          exit 1
      - name: Start ARQ worker
        working-directory: backend
        # Needed so the "PDF upload reaches ready" e2e assertion path has
        # something to reach ready — the ingestion pipeline itself is already
        # covered at the pytest level (test_documents_api.py).
        run: nohup arq app.workers.main.WorkerSettings > "$GITHUB_WORKSPACE/worker.log" 2>&1 &
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: frontend
        run: pnpm exec playwright install --with-deps chromium
      - name: Run e2e + a11y suite
        working-directory: frontend
        run: pnpm test:e2e
      - name: Upload debug logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-logs
          path: |
            backend.log
            worker.log
            frontend/playwright-report
          retention-days: 7
